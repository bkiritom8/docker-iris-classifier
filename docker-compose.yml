version: '3'

services:
  model-training:
    image: python:3.10-slim
    volumes:
      - model_exchange:/app
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt &&
               python src/model_training.py"

  serving:
    image: python:3.10-slim
    depends_on:
      model-training:
        condition: service_completed_successfully
    volumes:
      - model_exchange:/app
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    working_dir: /app
    ports:
      - "4000:4000"
    command: >
      bash -c "pip install -r requirements.txt &&
               python src/main.py"

volumes:
  model_exchange:
